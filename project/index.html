<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页 - Solo Trae 教程</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="header">
        <h1>欢迎来到我的网页！</h1>
        <p>这是一个使用Solo Trae Web Code制作的网页。</p>
    </header>

    <!-- 主要内容 -->
    <main class="main">
        <!-- 关于项目 -->
        <section class="section">
            <h2>关于这个项目</h2>
            <p>本项目是一个使用Solo Trae Web Code制作的网页教程，旨在帮助初学者学习如何使用AI工具创建和部署网页项目。</p>
            <ul>
                <li>使用HTML5、CSS3和JavaScript</li>
                <li>响应式设计，适配不同设备</li>
                <li>简单的交互功能</li>
                <li>部署到国内平台</li>
            </ul>
        </section>

        <!-- 功能展示 -->
        <section class="section">
            <h2>功能展示</h2>
            <div class="feature">
                <h3>响应式设计</h3>
                <p>这个网页在不同设备上都能良好显示。</p>
            </div>
            <div class="feature">
                <h3>交互功能</h3>
                <p>点击下方按钮，体验简单的交互效果。</p>
                <button id="greetButton" class="button">点击我</button>
                <div id="greetMessage" class="message"></div>
            </div>
        </section>

        <!-- 教程链接 -->
        <section class="section">
            <h2>教程资源</h2>
            <p>查看完整的教程文档：</p>
            <a href="../docs/index.md" class="link">教程文档</a>
        </section>
    </main>

    <!-- 页面底部 -->
    <footer class="footer">
        <p>&copy; 2026 Solo Trae 教程项目</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
